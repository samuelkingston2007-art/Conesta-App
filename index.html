<!DOCTYPE html>
<html>
<head>
<title>Gift Finder</title>
<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.container{
background:#1e293b;
padding:40px;
border-radius:15px;
text-align:center;
width:400px;
}
input,select,button{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}
button{
background:#22c55e;
color:white;
cursor:pointer;
}
#result{
margin-top:20px;
font-size:20px;
color:#22c55e;
}
</style>
</head>
<body>

<div class="container">
<h1>Gift Finder</h1>

<select id="occasion">
<option>Birthday</option>
<option>Anniversary</option>
<option>Christmas</option>
</select>

<input type="number" id="budget" placeholder="Enter Budget">

<button onclick="findGift()">Find Gift</button>

<div id="result"></div>
</div>

<script>
function findGift(){
let budget=document.getElementById("budget").value;

let gift="Greeting Card";

if(budget>=500) gift="Smart Watch";
else if(budget>=200) gift="Perfume";
else if(budget>=100) gift="Chocolate Box";

document.getElementById("result").innerHTML=
"Recommended Gift: "+gift;
}
</script>

</body>
</html>
